  <!-- ─────────────────────────────────────────
       EASY EDITS — change numbers here to adjust layout:
       
       Season band x positions and widths:
         Winter (left):   x=40,   width=160
         Pre-season:      x=200,  width=180
         Active season:   x=380,  width=560
         Winter (right):  x=940,  width=200

       Timeline axis y = 200
       Above-axis boxes: y=80 (top of box), height=50
       Below-axis bars:  y=230, y=270, y=305
  ───────────────────────────────────────────── -->
  <!-- ── SEASON BACKGROUND BANDS ── -->
  <rect
